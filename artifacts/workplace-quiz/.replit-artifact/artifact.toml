kind = "web"
previewPath = "/"
title = "职场毁型人格测试"
version = "1.0.0"
id = "artifacts/workplace-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21780

[services.development]
run = "pnpm --filter @workspace/workplace-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/workplace-quiz", "run", "build" ]
publicDir = "artifacts/workplace-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21780"
BASE_PATH = "/"
